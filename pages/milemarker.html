<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Road Milemarker Finder - Field Tools</title>
  <meta name="theme-color" content="#E5B33B">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root { --bg:#eef0f4; --surface:#fff; --border:#d1d9e0; --border-lo:#e8ecf0; --accent:#1a56db; --text:#111827; --muted:#6b7280; --radius:10px; --sans:'Inter',system-ui,-apple-system,Arial,sans-serif; }
    html[data-dark] { --bg:#0f1117; --surface:#1c1e26; --border:#2d3748; --border-lo:#1f2937; --text:#f1f5f9; --muted:#94a3b8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; animation:pageFadeIn 460ms cubic-bezier(0.16,1,0.3,1); }
    @keyframes pageFadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideInLeft { 0% { opacity:0; transform:translate3d(-18vw,0,0) scale(0.98); } 100% { opacity:1; transform:translate3d(0,0,0) scale(1); } }
    @keyframes slideOutLeft { 0% { opacity:1; transform:translate3d(0,0,0) scale(1); } 50% { opacity:0; transform:translate3d(-30vw,0,0) scale(0.98); } 100% { opacity:0; transform:translate3d(-40vw,0,0) scale(0.97); } }
    html.entering-from-hub body { opacity:0; transform:translate3d(-18vw,0,0) scale(0.98); animation:slideInLeft 380ms cubic-bezier(0.22,1,0.36,1) both !important; will-change:transform,opacity; }
    html.exiting-to-hub body { animation:slideOutLeft 360ms cubic-bezier(0.65,0,0.35,1) both !important; overflow:hidden; will-change:transform,opacity; }

    #topbar { position:sticky; top:0; z-index:600; height:54px; background:#1e2939; border-bottom:2px solid #E5B33B; display:flex; align-items:center; gap:12px; padding:0 16px; transition:transform 460ms cubic-bezier(0.65,0,0.35,1),opacity 460ms cubic-bezier(0.65,0,0.35,1); }
    #topbar.header-hidden { transform:translateY(-100%); opacity:0; pointer-events:none; }
    .topbar-back {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 12px 5px 9px;
      background:rgba(229,179,59,0.08);
      border:1px solid rgba(229,179,59,0.30);
      border-radius:999px;
      color:#E5B33B; text-decoration:none;
      font-size:12px; font-weight:600; letter-spacing:0.02em;
      transition:background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink:0; white-space:nowrap;
    }
    .topbar-back:hover { background:#C9971A; border-color:#C9971A; color:#fff; }
    .topbar-div { width:1px; height:22px; background:#374557; flex-shrink:0; }
    #topbar-title { color:#fff; font-size:15px; font-weight:700; flex:1; }

    .wrap { max-width:1200px; margin:0 auto; padding:20px 16px 36px; }

    /* Hero / search panel */
    .hero { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:18px 20px; margin-bottom:16px; }
    .hero h1 { font-size:20px; font-weight:700; line-height:1.25; margin-bottom:6px; }
    .hero p { color:var(--muted); font-size:13px; line-height:1.6; max-width:860px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; align-items:center; }
    .btn {
      font-family:var(--sans); border:1.5px solid var(--border); background:var(--surface);
      color:var(--text); border-radius:10px; padding:11px 20px; font-size:14px; font-weight:600;
      cursor:pointer; transition:transform 120ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
      white-space:nowrap;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,0.1); border-color:#b8c4d3; }
    .btn:active { transform:scale(0.97); }
    .btn-primary { background:#1a56db; border-color:#1a56db; color:#fff; }
    .btn-primary:hover { background:#1647b8; border-color:#1647b8; box-shadow:0 4px 14px rgba(26,86,219,0.3); }
    #retry-btn { display:none; } /* hidden until first locate succeeds */
    #retry-btn.visible { display:inline-flex; }

    /* Mode toggle — segmented control */
    .mode-toggle { display:inline-flex; gap:0; background:var(--border-lo); border-radius:10px; padding:3px; margin-top:14px; }
    .mode-btn { font-family:var(--sans); font-size:13px; font-weight:600; padding:7px 16px; border:none; background:transparent; color:var(--muted); border-radius:8px; cursor:pointer; transition:background 0.15s,color 0.15s,box-shadow 0.15s; white-space:nowrap; }
    .mode-btn.active { background:var(--surface); color:var(--accent); box-shadow:0 1px 4px rgba(0,0,0,0.12); }
    html[data-dark] .mode-btn.active { box-shadow:0 1px 4px rgba(0,0,0,0.4); }

    .status-wrap { margin-top:12px; display:flex; align-items:center; gap:8px; min-height:22px; }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:var(--muted); transition:background 0.2s; }
    .status-dot.active { background:#1a56db; animation:pulse 1.4s ease infinite; }
    .status-dot.ok { background:#10b981; animation:none; }
    .status-dot.err { background:#dc2626; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    #status { font-size:13px; color:var(--muted); }

    /* Result layout */
    .layout { display:grid; gap:16px; grid-template-columns:1fr; }
    .card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:18px 20px; }
    .card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:14px; }
    .result-empty { text-align:center; padding:28px 16px; color:var(--muted); font-size:14px; }
    .result-empty svg { display:block; margin:0 auto 10px; opacity:0.35; }

    .kv { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:9px 0; border-bottom:1px solid var(--border-lo); font-size:14px; }
    .kv:last-child { border-bottom:none; }
    .k { color:var(--muted); font-size:13px; white-space:nowrap; }
    .v { font-weight:600; word-break:break-word; text-align:right; color:var(--text); }
    .v.v-large { font-size:20px; font-weight:700; color:#1a56db; }
    .v.v-route { font-size:15px; font-weight:700; }
    .small { font-size:11px; color:var(--muted); margin-top:14px; line-height:1.5; }

    #map { height:340px; border:1px solid var(--border); border-radius:10px; overflow:hidden; }

    @media (max-width:600px) {
      .wrap { padding:14px 12px 28px; }
      .hero { padding:14px 16px; }
      .hero h1 { font-size:18px; }
      .actions { flex-direction:column; gap:8px; }
      .btn { width:100%; padding:13px 16px; text-align:center; }
      .card { padding:14px 16px; }
      #map { height:280px; }
      .kv { font-size:13px; }
    }

    @media (min-width:720px) {
      .wrap { padding:22px 24px 40px; }
      .hero { padding:22px 24px; margin-bottom:18px; }
      .hero h1 { font-size:22px; }
      .layout { grid-template-columns:minmax(360px, 420px) minmax(0, 1fr); align-items:start; gap:18px; }
      .card { padding:20px 22px; }
      #map { height:460px; }
    }

    @media (min-width:1100px) {
      .hero h1 { font-size:24px; }
      .layout { grid-template-columns:minmax(380px, 440px) minmax(0, 1fr); }
      #map { height:540px; position:sticky; top:72px; }
    }
  </style>
  <script>
    try {
      if (localStorage.getItem('field_dark_mode') === '1') document.documentElement.setAttribute('data-dark', '');
      if (sessionStorage.getItem('ft_opening_from_hub') === '1') {
        document.documentElement.classList.add('entering-from-hub');
        sessionStorage.removeItem('ft_opening_from_hub');
      }
    } catch (_) {}
  </script>
</head>
<body>
<div id="topbar">
  <a href="../index.html" class="topbar-back" id="hub-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    Home
  </a>
  <div class="topbar-div"></div>
  <span id="topbar-title">Road Milemarker Finder</span>
</div>

<div class="wrap">
  <section class="hero">
    <h1>Nearest Milepost Finder</h1>
    <p id="hero-desc">Uses GPS to find your nearest official milepost. Select a mode below, then tap Find.</p>
    <div class="mode-toggle" role="group" aria-label="Route type">
      <button class="mode-btn" id="mode-state">State Routes</button>
      <button class="mode-btn" id="mode-local">Local Routes</button>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="find-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:6px"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        Find My Milepost
      </button>
      <button class="btn" id="retry-btn">🔄 Refresh Location</button>
    </div>
    <div class="status-wrap">
      <div class="status-dot" id="status-dot"></div>
      <div id="status">Tap "Find My Milepost" to get started.</div>
    </div>
  </section>

  <section class="layout">
    <article class="card">
      <div class="card-title">Nearest Milepost</div>
      <div id="result-body">
        <div class="result-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          No result yet. Tap the button above.
        </div>
      </div>
      <p class="small">Loads nearby data tiles only — not the full statewide dataset.</p>
    </article>
    <article class="card" style="padding:0;overflow:hidden;">
      <div id="map"></div>
    </article>
  </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  setTimeout(function() { document.documentElement.classList.remove('entering-from-hub'); }, 420);
  try { localStorage.setItem('ft_last', 'milemarker'); } catch(_) {}

  window.addEventListener('storage', function(ev) {
    if (ev.key !== 'field_dark_mode') return;
    if (ev.newValue === '1') document.documentElement.setAttribute('data-dark', '');
    else document.documentElement.removeAttribute('data-dark');
  });

  var topbar = document.getElementById('topbar');
  var lastY = window.scrollY, downStart = null, over = false;
  topbar.addEventListener('mouseenter', function(){ over = true; });
  topbar.addEventListener('mouseleave', function(){ over = false; });
  window.addEventListener('scroll', function(){
    var y = window.scrollY;
    if (y > lastY && y > 80) { if (!downStart) downStart = Date.now(); if (Date.now() - downStart > 1000 && !over) topbar.classList.add('header-hidden'); }
    else { downStart = null; topbar.classList.remove('header-hidden'); }
    lastY = y;
  }, { passive:true });
  window.addEventListener('mousemove', function(e){ if (e.clientY <= 14) topbar.classList.remove('header-hidden'); });
  window.addEventListener('touchstart', function(e){ if (e.touches[0].clientY <= 30) topbar.classList.remove('header-hidden'); }, { passive:true });

  var link = document.getElementById('hub-back');
  if (link) {
    link.addEventListener('click', function(e) {
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
      e.preventDefault();
      try { sessionStorage.setItem('ft_returning_to_hub', '1'); } catch(_) {}
      var body = document.body;
      body.style.transition = 'none';
      body.style.opacity = '1';
      body.style.transform = 'translate3d(0, 0, 0) scale(1)';
      body.style.willChange = 'transform, opacity';
      body.style.backfaceVisibility = 'hidden';
      void body.offsetWidth;
      body.style.transition = 'opacity 320ms cubic-bezier(0.65, 0, 0.35, 1), transform 320ms cubic-bezier(0.65, 0, 0.35, 1)';
      body.style.opacity = '0';
      body.style.transform = 'translate3d(-30vw, 0, 0) scale(0.97)';
      setTimeout(function() { window.location.href = link.href; }, 340);
    });
  }

  var statusEl = document.getElementById('status');
  var statusDot = document.getElementById('status-dot');
  function setStatus(msg, state) {
    statusEl.textContent = msg;
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
  }
  function byId(id){ return document.getElementById(id); }

  var routeTypes = {
    "1":"Interstate", "2":"US Route", "3":"NJ State Highway",
    "4":"Authority / Parkway / Expressway", "5":"County Route",
    "6":"Local Route", "7":"Local Street", "8":"Ramp / Connector"
  };
  var currentMode = 'state';
  var stateSet = { "1":1, "2":1, "3":1, "4":1, "5":1 };
  var localSet  = { "6":1, "7":1, "8":1 };
  function modeAllowsSubtype(sub) {
    var s = String(sub || '');
    return currentMode === 'state' ? !!stateSet[s] : !!localSet[s];
  }
  function updateModeButtons() {
    var bState = document.getElementById('mode-state');
    var bLocal = document.getElementById('mode-local');
    if (!bState || !bLocal) return;
    if (currentMode === 'state') {
      bState.classList.add('active'); bLocal.classList.remove('active');
      document.getElementById('hero-desc').textContent = 'Uses GPS to find your nearest state-maintained milepost — Interstate, US, NJ Route, Parkway, and County Routes.';
      document.getElementById('status').textContent = 'Mode: State Routes. Tap "Find My Milepost" to get started.';
    } else {
      bLocal.classList.add('active'); bState.classList.remove('active');
      document.getElementById('hero-desc').textContent = 'Uses GPS to find your nearest local-road milepost — local streets, ramps, and connectors.';
      document.getElementById('status').textContent = 'Mode: Local Routes. Tap "Find My Milepost" to get started.';
    }
  }
  var idx = null;
  var chunkCache = {};
  var tileSize = 0.1;
  var map = L.map('map', { wheelDebounceTime: 200 }).setView([40.1, -74.5], 8);
  var streetLayer = L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    attribution: 'Map data &copy; Google',
    subdomains: '0123',
    maxZoom: 20
  });
  var satLayer = L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
    attribution: 'Map data &copy; Google',
    subdomains: '0123',
    maxZoom: 20
  }).addTo(map);
  L.control.layers({ 'Street': streetLayer, 'Satellite': satLayer }, null, { position: 'topright' }).addTo(map);
  var userMarker = null, userRing = null, nearestMarker = null;

  function toRad(v){ return v * Math.PI / 180; }
  function hav(lat1, lon1, lat2, lon2) {
    var R = 6371000, dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function bearingDeg(lat1, lon1, lat2, lon2) {
    var p1 = toRad(lat1), p2 = toRad(lat2), dLon = toRad(lon2 - lon1);
    var y = Math.sin(dLon) * Math.cos(p2);
    var x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dLon);
    var b = Math.atan2(y, x) * 180 / Math.PI;
    return (b + 360) % 360;
  }
  function cardinalFromBearing(b) {
    if (b >= 315 || b < 45) return 'Northbound';
    if (b >= 45 && b < 135) return 'Eastbound';
    if (b >= 135 && b < 225) return 'Southbound';
    return 'Westbound';
  }
  function nearestDirFromRoute(best, points) {
    var sri = best[3], bestI = -1, bestD = Infinity;
    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      if (p[3] !== sri) continue;
      var d = hav(best[0], best[1], p[0], p[1]);
      if (d < bestD) { bestD = d; bestI = i; }
    }
    if (bestI < 0) return null;
    var a = null, c = null;
    for (var j = bestI - 1; j >= 0; j--) { if (points[j][3] === sri) { a = points[j]; break; } }
    for (var k = bestI + 1; k < points.length; k++) { if (points[k][3] === sri) { c = points[k]; break; } }
    var from = a, to = c;
    if (!from && c) from = points[bestI];
    if (!to && a) to = points[bestI];
    if (!from || !to || (from[0] === to[0] && from[1] === to[1])) return null;
    var b = bearingDeg(from[0], from[1], to[0], to[1]);
    return { bearing: b, label: cardinalFromBearing(b) };
  }
  function tileKey(lat, lon){ return Math.floor(lat / tileSize) + "_" + Math.floor(lon / tileSize); }
  function fmtDist(m){ return m < 1609 ? Math.round(m) + " ft" : (m / 1609.344).toFixed(2) + " mi"; }
  function cleanSRI(s) {
    return String(s || '').replace(/_+$/g, '');
  }
  function setResult(res, userLat, userLon, dirInfo){
    var routeName = res[5] || cleanSRI(res[3]) || '-';
    var routeClass = routeTypes[res[4]] || ('Type ' + res[4]);
    var dirLabel = dirInfo && dirInfo.label ? dirInfo.label : '-';
    byId('result-body').innerHTML =
      '<div class="kv"><div class="k">Route</div><div class="v v-route">' + routeName + '</div></div>' +
      '<div class="kv"><div class="k">Milepost</div><div class="v v-large">MP ' + res[2] + '</div></div>' +
      '<div class="kv"><div class="k">Direction</div><div class="v">' + dirLabel + '</div></div>' +
      '<div class="kv"><div class="k">Route Class</div><div class="v">' + routeClass + '</div></div>' +
      '<div class="kv"><div class="k">Route ID (SRI)</div><div class="v">' + (cleanSRI(res[3]) || '-') + '</div></div>' +
      (res[6] ? '<div class="kv"><div class="k">Cross Street</div><div class="v">' + res[6] + '</div></div>' : '') +
      '<div class="kv"><div class="k">Distance from you</div><div class="v">' + fmtDist(res._dist) + '</div></div>' +
      '<div class="kv"><div class="k">Your GPS</div><div class="v" style="font-size:12px;font-family:monospace">' + userLat.toFixed(6) + ', ' + userLon.toFixed(6) + '</div></div>';
  }

  function fetchJsonWithFallback(paths) {
    var i = 0;
    function next() {
      if (i >= paths.length) return Promise.reject(new Error('all fetch attempts failed'));
      var p = paths[i++];
      return fetch(p, { cache: 'no-store' }).then(function(r){
        if (!r.ok) throw new Error('http ' + r.status);
        return r.json();
      }).catch(function(){ return next(); });
    }
    return next();
  }

  function loadIndex() {
    if (idx) return Promise.resolve(idx);
    var paths = ['../data/mileposts/index.json'];
    if (location.protocol === 'file:') {
      paths.push('http://127.0.0.1:8765/data/mileposts/index.json');
      paths.push('http://localhost:8765/data/mileposts/index.json');
    }
    return fetchJsonWithFallback(paths).then(function(j){
      idx = j; tileSize = +j.tileSizeDeg || 0.1; return j;
    });
  }

  function loadChunk(tile) {
    if (chunkCache[tile]) return Promise.resolve(chunkCache[tile]);
    var meta = idx.tiles[tile];
    if (!meta) return Promise.resolve([]);
    var paths = ['../' + meta.file];
    if (location.protocol === 'file:') {
      paths.push('http://127.0.0.1:8765/' + meta.file);
      paths.push('http://localhost:8765/' + meta.file);
    }
    return fetchJsonWithFallback(paths).then(function(j){
      chunkCache[tile] = j.points || [];
      return chunkCache[tile];
    }).catch(function(){ return []; });
  }

  function neighborTiles(lat, lon, radius) {
    var baseLat = Math.floor(lat / tileSize), baseLon = Math.floor(lon / tileSize), out = [];
    for (var a = -radius; a <= radius; a++) {
      for (var b = -radius; b <= radius; b++) {
        out.push((baseLat + a) + "_" + (baseLon + b));
      }
    }
    return out;
  }

  function findNearest(lat, lon) {
    return loadIndex().then(function() {
      var r = 1;
      function step() {
        var keys = neighborTiles(lat, lon, r).filter(function(k){ return !!idx.tiles[k]; });
        if (!keys.length && r < 3) { r++; return step(); }
        return Promise.all(keys.map(loadChunk)).then(function(sets){
          var all = [];
          for (var i=0; i<sets.length; i++) for (var j=0; j<sets[i].length; j++) all.push(sets[i][j]);
          if (!all.length && r < 3) { r++; return step(); }
          var best = null;
          for (var x=0; x<all.length; x++) {
            var p = all[x];
            if (!modeAllowsSubtype(p[4])) continue;
            var d = hav(lat, lon, p[0], p[1]);
            if (!best || d < best._dist) { best = p; best._dist = d; }
          }
          // If points exist but none matched the current mode, expand radius once more
          if (!best && all.length && r < 3) { r++; return step(); }
          return { best: best, points: all };
        });
      }
      return step();
    });
  }

  function doLocate() {
    setStatus('Getting GPS location…', 'active');
    byId('find-btn').disabled = true;
    if (!navigator.geolocation) { setStatus('Geolocation is not supported on this browser.', 'err'); byId('find-btn').disabled = false; return; }
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      setStatus('Searching nearby ' + (currentMode === 'state' ? 'state-route' : 'local-route') + ' tiles…', 'active');
      findNearest(lat, lon).then(function(result){
        byId('find-btn').disabled = false;
        byId('retry-btn').classList.add('visible');
        if (!result || !result.best) { setStatus('No ' + (currentMode === 'state' ? 'state-route' : 'local-route') + ' milepost found near this location.', 'err'); return; }
        var best = result.best;
        var dirInfo = nearestDirFromRoute(best, result.points || []);
        setResult(best, lat, lon, dirInfo);
        setStatus('Nearest milepost found.', 'ok');

        if (userMarker) map.removeLayer(userMarker);
        if (userRing) map.removeLayer(userRing);
        if (nearestMarker) map.removeLayer(nearestMarker);
        userRing = L.circle([lat, lon], {
          radius: Math.max(25, Math.min(80, (pos.coords.accuracy || 30) * 0.6)),
          color: '#1a56db',
          weight: 2,
          fillColor: '#1a56db',
          fillOpacity: 0.18
        }).addTo(map);
        userMarker = L.circleMarker([lat, lon], {
          radius: 10,
          color: '#ffffff',
          weight: 3,
          fillColor:'#1a56db',
          fillOpacity:1
        }).addTo(map).bindPopup('Your Current Location');
        var dirText = dirInfo && dirInfo.label ? ('<br>' + dirInfo.label) : '';
        nearestMarker = L.circleMarker([best[0], best[1]], { radius: 7, color: '#d97706', fillColor:'#d97706', fillOpacity:0.9 }).addTo(map)
          .bindPopup((routeTypes[best[4]] || 'Route') + ' • MP ' + best[2] + '<br>' + (best[5] || best[3]) + dirText);
        var g = L.featureGroup([userRing, userMarker, nearestMarker]);
        map.fitBounds(g.getBounds().pad(0.35));
        nearestMarker.openPopup();
      }).catch(function() {
        byId('find-btn').disabled = false;
        byId('retry-btn').classList.add('visible');
        if (location.protocol === 'file:') {
          setStatus('Could not load data. Use local server: http://127.0.0.1:8765/pages/milemarker.html', 'err');
        } else {
          setStatus('Could not search milepost data. Try again.', 'err');
        }
      });
    }, function(err){
      byId('find-btn').disabled = false;
      setStatus('Location error: ' + err.message, 'err');
    }, { enableHighAccuracy:true, timeout:15000, maximumAge:0 });
  }

  document.getElementById('find-btn').addEventListener('click', doLocate);
  document.getElementById('retry-btn').addEventListener('click', doLocate);
  document.getElementById('mode-state').addEventListener('click', function() { currentMode = 'state'; updateModeButtons(); });
  document.getElementById('mode-local').addEventListener('click', function() { currentMode = 'local'; updateModeButtons(); });
  updateModeButtons();

  // Clean up stale transition classes on bfcache restore
  window.addEventListener('pageshow', function() {
    document.documentElement.classList.remove('exiting-to-tool', 'exiting-to-hub', 'entering-from-hub', 'returning-from-tool');
  });

  // Intercept browser back button to play Home-return animation
  (function() {
    if (!window.history || !window.history.pushState) return;
    if (!history.state || !history.state.ftDummy) {
      history.pushState({ ftDummy: true }, '');
    }
    var backNavigating = false;
    window.addEventListener('popstate', function() {
      if (backNavigating) return;
      backNavigating = true;
      try { sessionStorage.setItem('ft_returning_to_hub', '1'); } catch(_){}
      var body = document.body;
      body.style.transition = 'none';
      body.style.opacity = '1';
      body.style.transform = 'translate3d(0, 0, 0) scale(1)';
      body.style.willChange = 'transform, opacity';
      body.style.backfaceVisibility = 'hidden';
      void body.offsetWidth;
      body.style.transition = 'opacity 320ms cubic-bezier(0.65, 0, 0.35, 1), transform 320ms cubic-bezier(0.65, 0, 0.35, 1)';
      body.style.opacity = '0';
      body.style.transform = 'translate3d(-30vw, 0, 0) scale(0.97)';
      setTimeout(function() { window.location.href = '../index.html'; }, 340);
    });
    window.addEventListener('pageshow', function(e) {
      if (e.persisted && (!history.state || !history.state.ftDummy)) {
        history.pushState({ ftDummy: true }, '');
        backNavigating = false;
      }
    });
  })();
})();
</script>
</body>
</html>
