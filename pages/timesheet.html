<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Overtime Tracker & Timesheet — Field Tools</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#E5B33B">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#eef0f4; --surface:#fff; --border:#d1d9e0; --border-lo:#e8ecf0;
      --accent:#1a56db; --accent-lo:rgba(26,86,219,0.08);
      --red:#dc2626; --red-lo:rgba(220,38,38,0.08);
      --text:#111827; --muted:#6b7280; --muted2:#4b5563;
      --radius-sm:5px; --radius:8px; --radius-lg:14px;
      --sans:'Inter',system-ui,-apple-system,Arial,sans-serif;
      --tr:0.14s ease;
      --gold:#E5B33B; --gold-lo:rgba(229,179,59,0.10); --gold-bd:rgba(229,179,59,0.28);
      --navy:#1e2939; --nav-h:62px;
    }
    html[data-dark] {
      --bg:#0f1117; --surface:#1c1e26; --border:#2d3748; --border-lo:#1f2937;
      --text:#f1f5f9; --muted:#94a3b8; --muted2:#cbd5e1;
      --accent-lo:rgba(26,86,219,0.15); --red-lo:rgba(220,38,38,0.12);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { background:var(--bg); }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; padding-bottom:var(--nav-h); }

    /* ── Animations ── */
    @keyframes pageFadeIn { from{opacity:0} to{opacity:1} }
    body { animation:pageFadeIn 460ms cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideInLeft { from{opacity:0;transform:translate3d(-18vw,0,0) scale(0.98)} to{opacity:1;transform:translate3d(0,0,0) scale(1)} }
    html.entering-from-hub body { opacity:0; transform:translate3d(-18vw,0,0) scale(0.98); animation:slideInLeft 380ms cubic-bezier(0.22,1,0.36,1) both !important; will-change:transform,opacity; }
    @keyframes slideOutLeft { 0%{opacity:1;transform:translate3d(0,0,0) scale(1)} 50%{opacity:0;transform:translate3d(-30vw,0,0) scale(0.98)} 100%{opacity:0;transform:translate3d(-40vw,0,0) scale(0.97)} }
    html.exiting-to-hub body { animation:slideOutLeft 360ms cubic-bezier(0.65,0,0.35,1) both !important; overflow:hidden; will-change:transform,opacity; backface-visibility:hidden; -webkit-backface-visibility:hidden; }
    html.exiting-to-hub { background:var(--bg); }
    @keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    @media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; } }

    /* ── Topbar ── */
    #topbar {
      height:54px; background:var(--navy); border-bottom:2px solid var(--gold);
      display:flex; align-items:center; padding:0 14px; gap:10px; flex-shrink:0;
      position:sticky; top:0; z-index:600;
      transition:transform 460ms cubic-bezier(0.65,0,0.35,1), opacity 460ms cubic-bezier(0.65,0,0.35,1);
      will-change:transform;
    }
    #topbar.header-hidden { transform:translateY(-100%); opacity:0; pointer-events:none; }
    .hub-back {
      display:flex; align-items:center; gap:6px; color:var(--gold);
      background:var(--gold-lo); border:1px solid var(--gold-bd); border-radius:20px;
      padding:5px 12px 5px 8px; font-size:12px; font-weight:600; text-decoration:none;
      transition:background var(--tr); white-space:nowrap; flex-shrink:0;
    }
    .hub-back:hover { background:rgba(229,179,59,0.2); color:#FEE9A1; }
    #topbar-title { color:#fff; font-size:15px; font-weight:700; flex:1; }
    .dark-toggle {
      background:var(--gold-lo); border:1px solid var(--gold-bd); color:var(--gold);
      border-radius:20px; padding:5px 9px; cursor:pointer; display:flex; align-items:center;
      transition:background var(--tr); flex-shrink:0;
    }
    .dark-toggle:hover { background:rgba(229,179,59,0.2); color:#FEE9A1; }

    /* ── Bottom Nav ── */
    #bottom-nav {
      position:fixed; bottom:0; left:0; right:0; height:var(--nav-h);
      background:var(--surface); border-top:1.5px solid var(--border);
      display:flex; z-index:600;
      padding-bottom:env(safe-area-inset-bottom,0px);
    }
    .nav-tab {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:3px; cursor:pointer; border:none; background:transparent;
      color:var(--muted); font-family:var(--sans); font-size:10px; font-weight:600;
      letter-spacing:0.03em; transition:color var(--tr); padding:0; -webkit-tap-highlight-color:transparent;
    }
    .nav-tab.active { color:var(--accent); }
    .nav-tab:active { transform:scale(0.92); }

    /* ── Main Content ── */
    #main-content { flex:1; max-width:520px; width:100%; margin:0 auto; padding:0 0 16px; }

    /* ── View header ── */
    .view-header { display:flex; align-items:center; padding:16px 14px 12px; gap:8px; }
    .view-nav-btn {
      background:var(--surface); border:1.5px solid var(--border); color:var(--text);
      border-radius:var(--radius-sm); height:32px; min-width:32px; padding:0 10px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:16px; font-weight:700; font-family:var(--sans);
      transition:border-color var(--tr), background var(--tr), color var(--tr); flex-shrink:0;
    }
    .view-nav-btn:hover { border-color:var(--accent); background:var(--accent-lo); color:var(--accent); }
    .view-nav-btn:active { transform:scale(0.95); }
    .view-header-center { flex:1; text-align:center; }
    .view-header-title { font-size:15px; font-weight:700; color:var(--text); }
    .view-header-sub { font-size:11px; color:var(--muted); margin-top:1px; }
    .today-pill {
      font-size:11px; font-weight:700; padding:4px 11px;
      background:var(--accent-lo); border:1.5px solid var(--accent); color:var(--accent);
      border-radius:20px; cursor:pointer; transition:all var(--tr); white-space:nowrap; flex-shrink:0;
      font-family:var(--sans);
    }
    .today-pill:hover { background:var(--accent); color:#fff; }

    /* ── Day stats ── */
    .day-summary { margin:0 14px 16px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .day-stat { background:var(--surface); border:1.5px solid var(--border-lo); border-radius:var(--radius-lg); padding:12px 8px; text-align:center; }
    .day-stat-val { font-size:20px; font-weight:700; line-height:1.1; }
    .day-stat-lbl { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:3px; }

    /* ── Entry card ── */
    .entry-card {
      background:var(--surface); border:1.5px solid var(--border-lo); border-radius:var(--radius-lg);
      margin:0 14px 10px; overflow:hidden;
      transition:border-color var(--tr), box-shadow var(--tr);
      animation:cardIn 260ms cubic-bezier(0.16,1,0.3,1) both;
    }
    .entry-card:hover { border-color:var(--border); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .entry-row { display:flex; align-items:center; padding:13px 14px; gap:10px; cursor:pointer; }
    .entry-type-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .dot-Regular,.dot-none { background:var(--accent); }
    .dot-XP        { background:#10b981; }
    .dot-Cash      { background:#f59e0b; }
    .dot-Emergency { background:#ef4444; }
    .entry-main { flex:1; min-width:0; }
    .entry-type-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:3px; }
    .badge-Regular   { background:var(--accent-lo);              color:var(--accent); }
    .badge-XP        { background:rgba(16,185,129,0.12);  color:#059669; }
    .badge-Cash      { background:rgba(245,158,11,0.12);   color:#b45309; }
    .badge-Emergency { background:rgba(220,38,38,0.10);    color:#dc2626; }
    .entry-time-row { font-size:12px; color:var(--muted); }
    .entry-notes { font-size:11px; color:var(--muted2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; margin-top:2px; }
    .entry-hrs-col { text-align:right; flex-shrink:0; }
    .entry-hrs-big { font-size:20px; font-weight:700; }
    .entry-hrs-lbl { font-size:10px; color:var(--muted); font-weight:600; }
    .entry-chevron { color:var(--muted); font-size:16px; margin-left:4px; transition:transform var(--tr); }
    .entry-card.expanded .entry-chevron { transform:rotate(90deg); }
    .entry-detail { display:none; padding:0 14px 14px; border-top:1px solid var(--border-lo); }
    .entry-card.expanded .entry-detail { display:block; }
    .detail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px 20px; padding-top:10px; margin-bottom:12px; }
    .detail-item { display:flex; flex-direction:column; gap:2px; }
    .detail-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); }
    .detail-val { font-size:13px; font-weight:600; color:var(--text); }
    .detail-full { grid-column:1/-1; }
    .entry-act-row { display:flex; gap:6px; }
    .entry-act { font-family:var(--sans); font-size:12px; font-weight:600; padding:6px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all var(--tr); }
    .entry-act:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lo); }
    .entry-act.del:hover { border-color:var(--red); color:var(--red); background:var(--red-lo); }
    .entry-act:active { transform:scale(0.95); }

    /* ── FAB ── */
    .fab {
      position:fixed; bottom:calc(var(--nav-h) + 14px); right:18px; z-index:590;
      width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff; border:none;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      box-shadow:0 4px 20px rgba(26,86,219,0.38); transition:background var(--tr), transform 80ms ease;
    }
    .fab:hover { background:#1647b8; }
    .fab:active { transform:scale(0.93); }
    .fab.hidden { display:none; }

    /* ── Empty state ── */
    .empty { text-align:center; padding:40px 20px 20px; color:var(--muted); }
    .empty svg { opacity:0.2; margin-bottom:14px; }
    .empty-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:6px; }
    .empty-desc  { font-size:13px; line-height:1.6; }

    /* ── Week view ── */
    .week-grid { margin:0 14px 14px; }
    .week-row {
      display:flex; align-items:center; background:var(--surface);
      border:1.5px solid var(--border-lo); border-radius:var(--radius);
      margin-bottom:6px; padding:11px 14px; cursor:pointer; gap:12px;
      transition:border-color var(--tr), box-shadow var(--tr);
      animation:cardIn 200ms cubic-bezier(0.16,1,0.3,1) both;
    }
    .week-row:hover { border-color:var(--border); box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .week-row.today-row { border-color:var(--accent); background:var(--accent-lo); }
    .week-row.weekend-row { background:var(--bg); }
    .week-day-col { width:44px; flex-shrink:0; }
    .week-dow { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
    .week-date { font-size:17px; font-weight:700; color:var(--text); }
    .week-row.today-row .week-date { color:var(--accent); }
    .week-middle { flex:1; min-width:0; }
    .week-entry-preview { font-size:12px; color:var(--muted); }
    .week-no-entry { font-size:12px; color:var(--muted); opacity:0.4; }
    .week-hrs-col { text-align:right; flex-shrink:0; }
    .week-hrs { font-size:16px; font-weight:700; color:var(--text); }
    .week-hrs.has-ot { color:var(--accent); }
    .week-ot-badge { font-size:10px; font-weight:700; color:#059669; }
    .week-no-hrs { font-size:13px; color:var(--muted); opacity:0.35; }

    /* ── Totals card ── */
    .totals-card {
      margin:0 14px 14px; background:var(--navy); border-radius:var(--radius-lg);
      padding:16px 18px; color:#fff;
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    }
    .totals-stat { text-align:center; }
    .totals-val { font-size:20px; font-weight:700; }
    .totals-lbl { font-size:10px; font-weight:600; opacity:0.6; text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }

    /* Export button */
    .export-btn-wrap { padding:0 14px 16px; }
    .export-btn {
      width:100%; padding:12px; background:transparent; color:var(--accent);
      border:1.5px solid var(--accent); border-radius:var(--radius-lg); font-family:var(--sans);
      font-size:13px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:all var(--tr);
    }
    .export-btn:hover { background:var(--accent); color:#fff; }
    .export-btn:active { transform:scale(0.98); }

    /* ── Month / calendar ── */
    .cal-grid-header { display:grid; grid-template-columns:repeat(7,1fr); margin:0 14px 4px; }
    .cal-dow { font-size:10px; font-weight:700; color:var(--muted); text-align:center; text-transform:uppercase; padding:4px 0; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); margin:0 14px 14px; gap:3px; }
    .cal-cell {
      aspect-ratio:1; border-radius:var(--radius-sm); display:flex; flex-direction:column;
      align-items:center; justify-content:center; cursor:pointer; position:relative;
      font-size:12px; font-weight:600; color:var(--text);
      transition:background var(--tr);
    }
    .cal-cell:hover:not(.other-month) { background:var(--accent-lo); }
    .cal-cell.other-month { opacity:0.25; pointer-events:none; }
    .cal-cell.today { background:var(--accent); color:#fff; border-radius:50%; }
    .cal-cell.today:hover { background:#1647b8; }
    .cal-cell.weekend:not(.today) { color:var(--muted); }
    .cal-cell.has-entry:not(.today)::after {
      content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
      width:5px; height:5px; border-radius:50%; background:var(--accent);
    }
    .cal-cell.has-ot:not(.today)::after { background:#10b981; }
    .cal-hrs { font-size:9px; color:var(--muted); font-weight:500; line-height:1; margin-top:1px; }
    .cal-cell.today .cal-hrs { color:rgba(255,255,255,0.75); }

    /* ── Settings ── */
    .settings-section { margin:0 14px 20px; }
    .settings-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:10px; padding-left:2px; }
    .settings-card { background:var(--surface); border:1.5px solid var(--border-lo); border-radius:var(--radius-lg); overflow:hidden; }
    .settings-row { display:flex; align-items:center; padding:13px 16px; gap:12px; border-bottom:1px solid var(--border-lo); }
    .settings-row:last-child { border-bottom:none; }
    .settings-row-label { flex:1; }
    .settings-row-main { font-size:14px; font-weight:600; color:var(--text); }
    .settings-row-sub  { font-size:11px; color:var(--muted); margin-top:2px; }
    .settings-row input[type="number"], .settings-row select {
      font-family:var(--sans); font-size:14px; color:var(--text); background:var(--bg);
      border:1.5px solid var(--border); border-radius:var(--radius-sm);
      padding:7px 10px; width:100px; text-align:right;
      transition:border-color var(--tr); -webkit-appearance:none; appearance:none;
    }
    .settings-row select { width:120px; }
    .settings-row input:focus, .settings-row select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-lo); }
    html[data-dark] .settings-row input, html[data-dark] .settings-row select { background:#161921; }
    .settings-toggle-btn {
      width:120px; padding:9px 10px; border-radius:var(--radius); border:1.5px solid var(--border);
      background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; font-weight:700;
      cursor:pointer; transition:background var(--tr), border-color var(--tr), color var(--tr), transform 80ms ease;
    }
    .settings-toggle-btn:hover { border-color:var(--accent); background:var(--accent-lo); color:var(--accent); }
    .settings-toggle-btn:active { transform:scale(0.97); }
    .danger-btn {
      width:100%; padding:13px; background:transparent; color:var(--red);
      border:1.5px solid var(--red); border-radius:var(--radius-lg); font-family:var(--sans);
      font-size:14px; font-weight:700; cursor:pointer; transition:all var(--tr);
    }
    .danger-btn:hover { background:var(--red); color:#fff; }
    .about-text { font-size:12px; color:var(--muted); line-height:1.6; text-align:center; padding:16px; }

    /* ── Bottom Sheet ── */
    .sheet-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:800;
      opacity:0; pointer-events:none; transition:opacity 280ms ease;
      backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    }
    .sheet-overlay.open { opacity:1; pointer-events:auto; }
    .sheet {
      position:fixed; left:0; right:0; bottom:0; z-index:801;
      background:var(--surface); border-radius:20px 20px 0 0;
      max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
      transform:translateY(100%); transition:transform 320ms cubic-bezier(0.22,1,0.36,1);
      padding-bottom:env(safe-area-inset-bottom,16px);
    }
    .sheet.open { transform:translateY(0); }
    .sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
    .sheet-header { padding:16px 18px 0; display:flex; align-items:center; justify-content:space-between; }
    .sheet-title  { font-size:16px; font-weight:700; }
    .sheet-close  { background:var(--bg); border:none; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); font-size:18px; transition:background var(--tr); }
    .sheet-close:hover { background:var(--border-lo); color:var(--text); }
    .sheet-body { padding:16px 18px 20px; }

    /* Form */
    .field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
    .field label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); }
    .field input, .field select {
      font-family:var(--sans); font-size:14px; color:var(--text); background:var(--bg);
      border:1.5px solid var(--border); border-radius:var(--radius); padding:10px 12px; width:100%;
      transition:border-color var(--tr), box-shadow var(--tr); -webkit-appearance:none; appearance:none;
    }
    .field input:focus, .field select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-lo); }
    html[data-dark] .field input, html[data-dark] .field select { background:#161921; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* Type grid */
    .fsect-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:8px; }
    .type-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; margin-bottom:16px; }
    @media (min-width:380px) { .type-grid { grid-template-columns:repeat(4,1fr); } }
    .type-opt { display:none; }
    .type-card {
      border:2px solid var(--border-lo); border-radius:var(--radius); padding:10px 6px;
      text-align:center; cursor:pointer; transition:border-color var(--tr), background var(--tr);
      display:flex; flex-direction:column; align-items:center; gap:4px;
    }
    .type-card-icon { font-size:16px; line-height:1; }
    .type-card-name { font-size:10px; font-weight:700; color:var(--muted); }
    .type-opt.reg-radio:checked + .type-card  { background:var(--accent-lo);             border-color:var(--accent); }
    .type-opt.reg-radio:checked + .type-card .type-card-name { color:var(--accent); }
    .type-opt.xp-radio:checked + .type-card   { background:rgba(16,185,129,0.08);  border-color:#10b981; }
    .type-opt.xp-radio:checked + .type-card .type-card-name { color:#059669; }
    .type-opt.cash-radio:checked + .type-card  { background:rgba(245,158,11,0.08); border-color:#f59e0b; }
    .type-opt.cash-radio:checked + .type-card .type-card-name { color:#b45309; }
    .type-opt.emg-radio:checked + .type-card  { background:rgba(220,38,38,0.08);   border-color:#ef4444; }
    .type-opt.emg-radio:checked + .type-card .type-card-name { color:#dc2626; }

    /* Shift toggle */
    .shift-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .shift-opt { display:none; }
    .shift-card {
      border:1.5px solid var(--border-lo); border-radius:var(--radius); padding:10px 8px;
      text-align:center; cursor:pointer; transition:border-color var(--tr), background var(--tr);
      font-size:12px; font-weight:600; color:var(--muted);
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .shift-opt:checked + .shift-card { border-color:var(--accent); background:var(--accent-lo); color:var(--accent); }

    /* Meal quick */
    .meal-bar { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
    .meal-q {
      font-family:var(--sans); font-size:11px; font-weight:600; padding:4px 10px;
      background:var(--bg); border:1.5px solid var(--border); border-radius:20px;
      cursor:pointer; color:var(--muted); transition:all var(--tr);
    }
    .meal-q:hover  { border-color:var(--accent); color:var(--accent); }
    .meal-q.active { border-color:var(--accent); background:var(--accent-lo); color:var(--accent); font-weight:700; }

    /* Live calc */
    .calc-box { border-radius:var(--radius); padding:13px 15px; margin:4px 0 16px; display:flex; align-items:center; gap:12px; min-height:60px; }
    .calc-box.ready { background:var(--accent-lo); border:1.5px solid rgba(26,86,219,0.18); }
    .calc-box.empty { background:var(--bg); border:1.5px solid var(--border-lo); }
    .calc-box.error { background:var(--red-lo); border:1.5px solid rgba(220,38,38,0.2); }
    .calc-big { font-size:28px; font-weight:700; color:var(--accent); line-height:1; white-space:nowrap; }
    .calc-detail { font-size:12px; color:var(--muted); line-height:1.65; }
    .calc-detail strong { color:var(--accent); }
    .calc-hint { font-size:12px; color:var(--muted); }
    .calc-err  { font-size:12px; color:var(--red); font-weight:600; }

    /* Sheet actions */
    .sheet-actions { display:flex; gap:8px; margin-top:6px; }
    .btn { font-family:var(--sans); font-size:13px; font-weight:700; padding:12px 18px; border-radius:var(--radius); border:1.5px solid transparent; cursor:pointer; transition:background var(--tr), border-color var(--tr), color var(--tr), transform 80ms ease; }
    .btn:active { transform:scale(0.97); }
    .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); flex:1; font-size:14px; }
    .btn-primary:hover { background:#1647b8; }
    .btn-ghost { background:transparent; color:var(--muted); border-color:var(--border); }
    .btn-ghost:hover { color:var(--text); border-color:var(--muted); }

    /* Toast */
    #toast-ct { position:fixed; bottom:calc(var(--nav-h) + 14px); left:50%; transform:translateX(-50%); z-index:1000; display:flex; flex-direction:column; gap:7px; pointer-events:none; }
    .toast { padding:10px 18px; border-radius:var(--radius); font-size:13px; font-weight:600; color:#fff; animation:toastIn 220ms cubic-bezier(0.16,1,0.3,1) both; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
    .toast.ok   { background:#059669; }
    .toast.err  { background:var(--red); }
    .toast.info { background:var(--navy); border:1px solid var(--gold); }
    .toast.out  { animation:toastOut 220ms ease both; }
    @keyframes toastIn  { from{opacity:0;transform:translateY(6px) scale(0.97)} to{opacity:1;transform:none} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(4px) scale(0.97)} }

    /* Misc */
    .hov-zone { position:fixed; top:0; left:0; right:0; height:14px; z-index:599; pointer-events:auto; }
    @media (hover:none) { .hov-zone { display:none; } }
    .version-stamp { font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); opacity:0.45; text-align:center; padding:16px 0 8px; }

<script>
// ================================================================
//  Overtime Tracker & Timesheet  |  Field Tools
//  Storage: ft_ts_entries, ft_ts_settings
// ================================================================

var LS_ENTRIES  = 'ft_ts_entries';
var LS_SETTINGS = 'ft_ts_settings';

var DEFAULT_SETTINGS = {
  hourlyRate: 0, otMultiplier: 1.5, otThresholdHrs: 8,
  breakDefault: 30, timeFormat: '12', defaultView: 'day', weekStart: 'sun'
};

// State
var state = { view: 'day', date: todayStr() };
var editingId = null;

// ── Storage ──────────────────────────────────────────────────────
function loadEntries()  { try { return JSON.parse(localStorage.getItem(LS_ENTRIES)  || '[]');  } catch(e) { return []; } }
function storeEntries(a){ try { localStorage.setItem(LS_ENTRIES,  JSON.stringify(a)); } catch(e) {} }
function loadSettings() {
  try { return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem(LS_SETTINGS) || '{}')); }
  catch(e) { return Object.assign({}, DEFAULT_SETTINGS); }
}
function storeSettings(o){ try { localStorage.setItem(LS_SETTINGS, JSON.stringify(o)); } catch(e) {} }

// ── Date utils ───────────────────────────────────────────────────
function pad(n)       { return String(n).padStart(2,'0'); }
function todayStr()   { var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseDate(s) { return s ? new Date(s+'T00:00:00') : null; }
function dateStr(d)   { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addDays(s,n) { var d=parseDate(s); d.setDate(d.getDate()+n); return dateStr(d); }

var MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_SH   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS_SH     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getWeekStart(dateS, startDay) {
  var d = parseDate(dateS), dow = d.getDay();
  var off = (startDay === 'mon') ? (dow === 0 ? -6 : 1 - dow) : -dow;
  d.setDate(d.getDate() + off);
  return dateStr(d);
}

function fmtDate(dateS) {
  var d = parseDate(dateS);
  return DAYS_SH[d.getDay()] + ', ' + MONTHS_SH[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function fmtDateShort(dateS) { var d=parseDate(dateS); return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtTime(t, fmt) {
  if (!t) return '—';
  var p=t.split(':'), h=parseInt(p[0]), m=p[1];
  if (fmt === '24') return pad(h)+':'+m;
  return (h%12||12)+':'+m+(h>=12?' PM':' AM');
}
function isoWeek(d) {
  var dt=new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);
  var w1=new Date(dt.getFullYear(),0,4);
  return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);
}

// ── Calculations ─────────────────────────────────────────────────
function t2m(t) { if(!t)return null; var p=t.split(':'); return p.length<2?null:parseInt(p[0])*60+parseInt(p[1]); }
function hFmt(m) { return (m/60).toFixed(2); }
function hDisp(m) { var h=Math.floor(m/60),mn=m%60; return h+(mn?'h '+mn+'m':'h'); }
function fmtMoney(v) { return '$'+v.toFixed(2); }

function calcEntry(e, settings) {
  var s=t2m(e.start), en=t2m(e.stop);
  if (s===null||en===null) return null;
  var dur=en-s;
  if (e.overnight||dur<0) dur+=1440;
  var brk=parseInt(e.breakMin)||0;
  var netM=dur-brk;
  if (netM<0) return null;
  var thresh=(parseFloat(settings.otThresholdHrs)||8)*60;
  var regM=Math.min(netM,thresh), otM=Math.max(0,netM-thresh);
  var hr=parseFloat(settings.hourlyRate)||0;
  var mult=parseFloat(settings.otMultiplier)||1.5;
  var earnings=hr>0?(regM/60*hr+otM/60*hr*mult):0;
  return { netM:netM, regM:regM, otM:otM, earnings:earnings };
}

function totalsFor(entries, settings) {
  var netM=0, otM=0, earnings=0;
  entries.forEach(function(e) {
    var r=calcEntry(e,settings);
    if (r) { netM+=r.netM; otM+=r.otM; earnings+=r.earnings; }
  });
  return { netM:netM, otM:otM, earnings:earnings };
}

// ── Render dispatcher ─────────────────────────────────────────────
function render() {
  document.querySelectorAll('.nav-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.view===state.view);
  });
  var fab=document.getElementById('fab');
  if (fab) fab.classList.toggle('hidden', state.view==='settings');

  var mc=document.getElementById('main-content');
  if      (state.view==='day')      renderDay(mc);
  else if (state.view==='week')     renderWeek(mc);
  else if (state.view==='month')    renderMonth(mc);
  else                              renderSettings(mc);
}

// ── Day View ─────────────────────────────────────────────────────
function renderDay(mc) {
  var settings=loadSettings(), tf=settings.timeFormat||'12';
  var dateS=state.date, today=todayStr(), hr=parseFloat(settings.hourlyRate)||0;
  var entries=loadEntries().filter(function(e){return e.date===dateS;});
  var tots=totalsFor(entries,settings);

  var isToday=(dateS===today);
  var html='<div class="view-header">'+
    '<button class="view-nav-btn" id="day-prev">&#8249;</button>'+
    '<div class="view-header-center">'+
      '<div class="view-header-title">'+fmtDate(dateS)+'</div>'+
      (isToday?'<div class="view-header-sub" style="color:var(--accent);font-weight:700;">Today</div>':'<div class="view-header-sub">'+fmtDateShort(dateS)+'</div>')+
    '</div>'+
    (!isToday?'<button class="today-pill" id="day-today">Today</button>':'')+
    '<button class="view-nav-btn" id="day-next">&#8250;</button>'+
  '</div>';

  html+='<div class="day-summary">'+
    '<div class="day-stat"><div class="day-stat-val">'+hFmt(tots.netM)+'</div><div class="day-stat-lbl">Total Hrs</div></div>'+
    '<div class="day-stat"><div class="day-stat-val" style="color:var(--accent)">'+hFmt(tots.otM)+'</div><div class="day-stat-lbl">OT Hrs</div></div>'+
    (hr>0
      ?'<div class="day-stat"><div class="day-stat-val" style="color:#059669">'+fmtMoney(tots.earnings)+'</div><div class="day-stat-lbl">Earnings</div></div>'
      :'<div class="day-stat"><div class="day-stat-val">'+entries.length+'</div><div class="day-stat-lbl">Entries</div></div>')+
  '</div>';

  if (!entries.length) {
    html+=emptyState('No entries for this day','Tap + to log your hours.');
  } else {
    entries.forEach(function(e) { html+=buildEntryCard(e,calcEntry(e,settings),settings); });
  }
  html+='<div class="version-stamp">Field Tools · OT Tracker · v1.0</div>';
  mc.innerHTML=html;

  mc.querySelector('#day-prev').addEventListener('click',function(){ state.date=addDays(state.date,-1); render(); });
  mc.querySelector('#day-next').addEventListener('click',function(){ state.date=addDays(state.date,1);  render(); });
  var tp=mc.querySelector('#day-today');
  if (tp) tp.addEventListener('click',function(){ state.date=todayStr(); render(); });
  wireCards(mc);
}

// ── Week View ─────────────────────────────────────────────────────
function renderWeek(mc) {
  var settings=loadSettings(), hr=parseFloat(settings.hourlyRate)||0;
  var ws=getWeekStart(state.date, settings.weekStart||'sun');
  var we=addDays(ws,6), today=todayStr();
  var dates=[], allEntries=[], entryMap={};
  for (var i=0;i<7;i++) { var d=addDays(ws,i); dates.push(d); entryMap[d]=[]; }
  loadEntries().forEach(function(e){ if(entryMap[e.date]) entryMap[e.date].push(e); });
  dates.forEach(function(d){ allEntries=allEntries.concat(entryMap[d]); });
  var tots=totalsFor(allEntries,settings);

  var html='<div class="view-header">'+
    '<button class="view-nav-btn" id="wk-prev">&#8249;</button>'+
    '<div class="view-header-center">'+
      '<div class="view-header-title">'+fmtDateShort(ws)+' – '+fmtDateShort(we)+'</div>'+
      '<div class="view-header-sub">Week '+isoWeek(parseDate(ws))+'</div>'+
    '</div>'+
    '<button class="today-pill" id="wk-today">Today</button>'+
    '<button class="view-nav-btn" id="wk-next">&#8250;</button>'+
  '</div>';

  html+='<div class="week-grid">';
  dates.forEach(function(dateS, idx) {
    var d=parseDate(dateS), dow=d.getDay();
    var isWeekend=(dow===0||dow===6), isToday=(dateS===today);
    var dayE=entryMap[dateS], dayT=totalsFor(dayE,settings), hasOT=dayT.otM>0;
    var cls='week-row'+(isToday?' today-row':'')+(isWeekend&&!isToday?' weekend-row':'');
    html+='<div class="'+cls+'" data-goto="'+dateS+'" style="animation-delay:'+(idx*30)+'ms">'+
      '<div class="week-day-col"><div class="week-dow">'+DAYS_SH[dow]+'</div><div class="week-date">'+d.getDate()+'</div></div>'+
      '<div class="week-middle">'+
        (dayE.length>0
          ?'<div class="week-entry-preview">'+dayE.length+' entr'+(dayE.length===1?'y':'ies')+(dayE[0].otType?' · '+dayE[0].otType:'')+'</div>'
          :'<div class="week-no-entry">No entries</div>')+
      '</div>'+
      '<div class="week-hrs-col">'+
        (dayT.netM>0
          ?'<div class="week-hrs'+(hasOT?' has-ot':'')+'">'+hFmt(dayT.netM)+'</div>'+(hasOT?'<div class="week-ot-badge">+'+hFmt(dayT.otM)+' OT</div>':'')
          :'<div class="week-no-hrs">—</div>')+
      '</div>'+
    '</div>';
  });
  html+='</div>';

  html+='<div class="totals-card">'+

function renderMonth(mc) {
  var settings=loadSettings(), hr=parseFloat(settings.hourlyRate)||0;

  var today=todayStr(), weekStartDay=settings.weekStart||'sun';

  var eMap={};
  allEntries.forEach(function(e){ if(!eMap[e.date])eMap[e.date]=[]; eMap[e.date].push(e); });

  var startDow=firstDay.getDay();

function openSheet(entry) {
  var settings=loadSettings();

  document.querySelectorAll('[name="ot-type"]').forEach(function(r){r.checked=false;});

  document.getElementById('shift-day').checked=true;
  document.getElementById('f-date').value=state.date||todayStr();
  document.getElementById('f-start').value='';
  document.getElementById('f-stop').value='';
  document.getElementById('f-meal').value=settings.breakDefault||30;
  document.getElementById('f-job').value='';
  document.getElementById('f-act').value='';
  document.getElementById('f-notes').value='';
  setMealActive(parseInt(settings.breakDefault)||30);

  if (entry) {
    var tr=document.getElementById('type-'+(entry.otType||'XP'));
    if (tr) tr.checked=true;
    document.getElementById('shift-'+(entry.overnight?'night':'day')).checked=true;
    document.getElementById('f-date').value=entry.date||todayStr();
    document.getElementById('f-start').value=entry.start||'';
    document.getElementById('f-stop').value=entry.stop||'';
    document.getElementById('f-meal').value=entry.breakMin!=null?entry.breakMin:settings.breakDefault;
    document.getElementById('f-job').value=entry.job||'';
    document.getElementById('f-act').value=entry.act||'';
    document.getElementById('f-notes').value=entry.notes||'';
    setMealActive(parseInt(entry.breakMin)||0);
  }

  updateCalc();
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
}

function setMealActive(val) {
  document.querySelectorAll('.meal-q').forEach(function(q){ q.classList.toggle('active',parseInt(q.dataset.min)===val); });
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
  editingId=null;
}

function saveEntry() {
  var otType=(document.querySelector('[name="ot-type"]:checked')||{}).value||'XP';
  var overnight=document.getElementById('shift-night').checked;
  var date=document.getElementById('f-date').value;
  var start=document.getElementById('f-start').value;
  var stop=document.getElementById('f-stop').value;
  var breakMin=parseInt(document.getElementById('f-meal').value)||0;

  if (!date)  { showToast('Please enter a date','err');       return; }
  if (!start) { showToast('Please enter a start time','err'); return; }
  if (!stop)  { showToast('Please enter a stop time','err');  return; }

  var s=t2m(start), e=t2m(stop);
  var dur=e-s; if(overnight||dur<0) dur+=1440;
  var netM=dur-breakMin;
  if (netM<0) { showToast('Invalid time range — try Night Shift for midnight crossings','err'); return; }

  var entry={
    id:editingId||('e'+Date.now()),
    date:date, start:start, stop:stop, breakMin:breakMin, overnight:overnight,
    otType:otType,
    job:document.getElementById('f-job').value.trim(),
    act:document.getElementById('f-act').value.trim(),
    notes:document.getElementById('f-notes').value.trim()
  };

  var all=loadEntries();
  if (editingId) {
    var idx=-1;
    for (var i=0;i<all.length;i++) if(all[i].id===editingId){idx=i;break;}
    if (idx>=0) all[idx]=entry; else all.push(entry);
  } else { all.push(entry); }
  storeEntries(all);
  closeSheet();
  state.date=date; state.view='day';
  render();
  showToast((editingId?'Updated · ':'Saved · ')+hFmt(netM)+' hrs','ok',2400);
}

// ── Live calc ─────────────────────────────────────────────────────
function updateCalc() {
  var start=document.getElementById('f-start').value;
  var stop=document.getElementById('f-stop').value;
  var meal=parseInt(document.getElementById('f-meal').value)||0;
  var overnight=document.getElementById('shift-night').checked;
  var box=document.getElementById('calc-box');
  var settings=loadSettings(), tf=settings.timeFormat||'12';

  if (!start||!stop) {
    box.className='calc-box empty';
    box.innerHTML='<div class="calc-hint">Enter start and stop times to calculate hours.</div>';
    return;
  }
  var s=t2m(start), e=t2m(stop);
  var dur=e-s; if(overnight||dur<0) dur+=1440;
  var netM=dur-meal;
  if (netM<0) {
    box.className='calc-box error';
    box.innerHTML='<div class="calc-err">⚠ Stop time before start — toggle Night Shift if crossing midnight.</div>';
    return;
  }
  var thresh=(parseFloat(settings.otThresholdHrs)||8)*60;
  var otM=Math.max(0,netM-thresh);
  var hr=parseFloat(settings.hourlyRate)||0;
  var earnings=hr>0?(Math.min(netM,thresh)/60*hr+otM/60*hr*(parseFloat(settings.otMultiplier)||1.5)):0;

  box.className='calc-box ready';
  box.innerHTML=
    '<div class="calc-big">'+hFmt(netM)+'<span style="font-size:14px;font-weight:500;opacity:0.7"> h</span></div>'+
    '<div class="calc-detail">'+
      fmtTime(start,tf)+' → '+fmtTime(stop,tf)+(overnight?' <em style="font-size:10px">(next day)</em>':'')+
      (meal>0?'<br>−'+meal+' min break':'')+'<br>'+
      (otM>0?'<strong style="color:#059669">+'+hFmt(otM)+' OT</strong>':'<strong>'+hFmt(netM)+' reg</strong>')+
      (hr>0?' · <strong style="color:#059669">'+fmtMoney(earnings)+'</strong>':'')+
    '</div>';
}

// ── PDF Export ────────────────────────────────────────────────────
function exportPDF(period, startDate, endDate) {
  var jsPDFClass=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  if (!jsPDFClass) { showToast('PDF library loading — try again','info'); return; }

  var settings=loadSettings(), tf=settings.timeFormat||'12';
  var hr=parseFloat(settings.hourlyRate)||0;
  var entries=loadEntries().filter(function(e){ return e.date>=startDate&&e.date<=endDate; });
  entries.sort(function(a,b){ return a.date<b.date?-1:1; });

  var doc=new jsPDFClass({orientation:'portrait',unit:'mm',format:'letter'});

  doc.setFontSize(16); doc.setFont(undefined,'bold');
  doc.text('OT Tracker — '+(period==='week'?'Weekly':'Monthly')+' Report',14,20);
  doc.setFontSize(10); doc.setFont(undefined,'normal');
  doc.text('Period: '+fmtDate(startDate)+' – '+fmtDate(endDate),14,28);
  doc.text('Generated: '+new Date().toLocaleDateString(),14,34);

  var head=[['Date','Start','Stop','Break','Hrs','OT','Type','Notes']];
  var body=[], totNetM=0, totOtM=0, totEarn=0;

  entries.forEach(function(e) {
    var r=calcEntry(e,settings);
    if(r){totNetM+=r.netM; totOtM+=r.otM; totEarn+=r.earnings;}
    body.push([
      fmtDateShort(e.date),
      fmtTime(e.start,tf),
      fmtTime(e.stop,tf),
      (e.breakMin||0)+' min',
      r?hFmt(r.netM):'—',
      (r&&r.otM>0)?hFmt(r.otM):'—',
      e.otType||'XP',
      e.notes||''
    ]);
  });
  body.push(['TOTAL','','','',hFmt(totNetM),hFmt(totOtM),(hr>0?fmtMoney(totEarn):''),'']);

  doc.autoTable({
    startY:40, head:head, body:body, theme:'striped',
    headStyles:{fillColor:[30,41,57],textColor:255,fontStyle:'bold'},
    styles:{fontSize:9,cellPadding:2},
    columnStyles:{7:{cellWidth:38}},
    didParseCell:function(data){
      if(data.row.index===body.length-1&&data.section==='body') data.cell.styles.fontStyle='bold';
    }
  });

  doc.save('OT-Report-'+startDate+'-to-'+endDate+'.pdf');
  showToast('PDF exported!','ok',2000);
}

  var ct=document.getElementById('toast-ct');
  if (!ct) return;
  var t=document.createElement('div');
  t.className='toast '+(type||'info');
  t.textContent=msg;
  ct.appendChild(t);
  setTimeout(function(){t.classList.add('out');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},240);},dur||2200);
}

// ── Boot ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function() {
  setTimeout(function(){ document.documentElement.classList.remove('entering-from-hub'); },500);

  var settings=loadSettings();
  state.view=settings.defaultView||'day';
  state.date=todayStr();
  render();

  // Nav tabs
  document.querySelectorAll('.nav-tab').forEach(function(tab){
    tab.addEventListener('click',function(){ state.view=this.dataset.view; render(); });
  });

  // FAB
  document.getElementById('fab').addEventListener('click',function(){ openSheet(null); });

  // Sheet
  document.getElementById('sheet-close').addEventListener('click',closeSheet);
  document.getElementById('sheet-overlay').addEventListener('click',closeSheet);
  document.getElementById('form-cancel').addEventListener('click',closeSheet);
  document.getElementById('form-save').addEventListener('click',saveEntry);

  // Calc listeners
  ['f-start','f-stop','f-meal'].forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener('input',updateCalc);
    el.addEventListener('change',updateCalc);
  });
  document.querySelectorAll('[name="shift-type"]').forEach(function(r){ r.addEventListener('change',updateCalc); });

  // Meal quick buttons
  document.querySelectorAll('.meal-q').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.getElementById('f-meal').value=this.dataset.min;
      setMealActive(parseInt(this.dataset.min));
      updateCalc();
    });
  });

  // Back button — exact match to other tools
  (function(){
    var link=document.querySelector('.hub-back');
    if (!link) return;
    link.addEventListener('click',function(e){
      if (e.metaKey||e.ctrlKey||e.shiftKey||e.button===1) return;
      e.preventDefault();
      try { sessionStorage.setItem('ft_returning_to_hub','1'); } catch(_) {}
      document.documentElement.classList.add('exiting-to-hub');
      setTimeout(function(){ window.location.href=link.href; },360);
    });
  })();

  // Dark toggle
  document.getElementById('dark-tog').addEventListener('click',function(){
    var dark=document.documentElement.hasAttribute('data-dark');
    if (dark){ document.documentElement.removeAttribute('data-dark'); localStorage.setItem('field_dark_mode','0'); }
    else      { document.documentElement.setAttribute('data-dark','');  localStorage.setItem('field_dark_mode','1'); }
  });

  // Smart header hide
  var topbar=document.getElementById('topbar');
  var lastY=0, tick=false, dnStart=null, over=false;
  topbar.addEventListener('mouseenter',function(){ over=true;  });
  topbar.addEventListener('mouseleave',function(){ over=false; });
  document.getElementById('hov-zone').addEventListener('mouseenter',function(){ topbar.classList.remove('header-hidden'); });
  window.addEventListener('scroll',function(){
    if(tick)return; tick=true;
    requestAnimationFrame(function(){
      var y=window.scrollY;
      if(y>lastY&&y>80){ if(!dnStart)dnStart=Date.now(); if(Date.now()-dnStart>1000&&!over)topbar.classList.add('header-hidden'); }
      else { dnStart=null; topbar.classList.remove('header-hidden'); }
      lastY=y; tick=false;
    });
  },{passive:true});
  window.addEventListener('mousemove',function(e){ if(e.clientY<=14)topbar.classList.remove('header-hidden'); });
  window.addEventListener('touchstart',function(e){ if(e.touches[0].clientY<=30)topbar.classList.remove('header-hidden'); },{passive:true});

  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('../service-worker.js').catch(function(){}); }
});
</script>
</body>
</html>
